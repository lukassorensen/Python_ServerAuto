apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes
  template:
    metadata:
      labels:
        app: kubernetes
    spec:
      containers:
      - name: hello-python
        image: ghcr.io/lukassorensen/dockerkode:latest
        imagePullPolicy: IfNotPresent

